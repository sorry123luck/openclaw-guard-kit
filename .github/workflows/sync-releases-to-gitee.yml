name: Sync Releases to Gitee

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current GitHub repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get release info
        id: info
        run: |
          echo "tag=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          echo "name=${{ github.event.release.name }}" >> $GITHUB_OUTPUT

      - name: Download release assets
        env:
          RELEASE_ASSETS_JSON: ${{ toJson(github.event.release.assets) }}
        run: |
          mkdir -p release-assets
          python3 - <<'PY'
          import json, os, subprocess

          assets = json.loads(os.environ["RELEASE_ASSETS_JSON"])
          for asset in assets:
              url = asset["browser_download_url"]
              name = asset["name"]
              print(f"Downloading {name} from {url}")
              subprocess.run(
                  ["curl", "-L", "-o", f"release-assets/{name}", url],
                  check=True
              )
          PY

      - name: Push GitHub repo to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote add gitee https://oauth2:${GITEE_TOKEN}@gitee.com/sorry123luck/openclaw-guard-kit.git
          git push --mirror gitee

      - name: Upload assets to Gitee Release
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          TAG: ${{ steps.info.outputs.tag }}
        run: |
          cd release-assets
          shopt -s nullglob
          for file in *; do
            echo "Uploading $file to Gitee release $TAG"
            curl --fail -X POST "https://gitee.com/api/v5/repos/sorry123luck/openclaw-guard-kit/releases/assets" \
              -F "access_token=$GITEE_TOKEN" \
              -F "tag_name=$TAG" \
              -F "name=$file" \
              -F "file=@$file"
          done