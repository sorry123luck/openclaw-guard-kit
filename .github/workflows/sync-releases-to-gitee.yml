name: Sync Releases to Gitee

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "要同步的 Release 标签，比如 v.1.0.1"
        required: true
        type: string

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current GitHub repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Get release info
        id: info
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            echo "tag=$RELEASE_TAG" >> $GITHUB_OUTPUT
            echo "Using release event tag: $RELEASE_TAG"
          else
            echo "tag=$INPUT_TAG" >> $GITHUB_OUTPUT
            echo "Using manual input tag: $INPUT_TAG"
          fi

      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TAG: ${{ steps.info.outputs.tag }}
        run: |
          mkdir -p release-assets
          python3 - <<'PY'
          import json
          import os
          import urllib.request

          repo = os.environ["REPO"]
          tag = os.environ["TAG"]
          token = os.environ["GH_TOKEN"]

          api_url = f"https://api.github.com/repos/{repo}/releases/tags/{tag}"
          req = urllib.request.Request(
              api_url,
              headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json"
              }
          )

          with urllib.request.urlopen(req) as resp:
              release = json.load(resp)

          assets = release.get("assets", [])
          if not assets:
              raise SystemExit(f"No assets found for release tag: {tag}")

          for asset in assets:
              name = asset["name"]
              url = asset["browser_download_url"]
              print(f"Downloading {name} from {url}")

              dl_req = urllib.request.Request(url)
              with urllib.request.urlopen(dl_req) as dl_resp, open(f"release-assets/{name}", "wb") as f:
                  f.write(dl_resp.read())
          PY

        - name: Push GitHub repo to Gitee
        env:
          GITEE_USERNAME: ${{ secrets.GITEE_USERNAME }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote add gitee https://${GITEE_USERNAME}:${GITEE_TOKEN}@gitee.com/sorry123luck/openclaw-guard-kit.git
          git push --mirror gitee

      - name: Upload assets to Gitee Release
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          TAG: ${{ steps.info.outputs.tag }}
        run: |
          cd release-assets
          shopt -s nullglob
          for file in *; do
            echo "Uploading $file to Gitee release $TAG"
            curl --fail -X POST "https://gitee.com/api/v5/repos/sorry123luck/openclaw-guard-kit/releases/assets" \
              -F "access_token=$GITEE_TOKEN" \
              -F "tag_name=$TAG" \
              -F "name=$file" \
              -F "file=@$file"
          done